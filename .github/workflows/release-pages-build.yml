name: Release Pages Build

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-pages-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: pages-build
      ARTIFACT_BASENAME: jei-web-dist

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run build:cloudflare

      - name: Resolve build output
        id: build-output
        shell: bash
        run: |
          set -euo pipefail

          if [ -d dist/spa ]; then
            echo "path=dist/spa" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -d dist ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Build output directory not found" >&2
          exit 1

      - name: Package release artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          timestamp="$(date -u +'%Y%m%d-%H%M')"
          short_sha="${GITHUB_SHA::7}"
          release_name="Pages Build ${timestamp} ${short_sha}"
          asset_name="${ARTIFACT_BASENAME}-${timestamp}-${short_sha}.zip"
          build_dir="${{ steps.build-output.outputs.path }}"

          rm -f "$asset_name"
          cd "$build_dir"
          zip -r "$GITHUB_WORKSPACE/$asset_name" .

          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"
          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jei-web-release-build
          path: ${{ steps.package.outputs.asset_name }}
          if-no-files-found: error

      - name: Publish GitHub Release asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: ${{ steps.package.outputs.release_name }}
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          removeArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: ${{ steps.package.outputs.asset_name }}
          commit: ${{ github.sha }}
          body: |
            Automatic Pages build artifact.

            Source ref: ${{ github.ref_name }}
            Source commit: ${{ github.sha }}
